name: API Drift Detection

on:
  schedule:
    # Run weekly on Sundays at 2 AM UTC
    # Note: 2 AM UTC = Saturday 6 PM PST (winter) / 7 PM PDT (summer)
    # This ensures it runs Saturday evening in US timezones, avoiding Sunday disruptions
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      service:
        description: 'Specific service to check (empty = all)'
        required: false
        default: ''
      dry_run:
        description: 'Check only (do not create PRs)'
        type: boolean
        required: false
        default: false

# Security: Minimal required permissions
permissions:
  contents: write       # For committing snapshots and generated code
  pull-requests: write  # For opening PRs with drift changes
  issues: write         # For creating breaking change alerts

concurrency:
  # Use constant group since this only runs on default branch
  # Prevents concurrent runs but allows different refs to queue
  group: api-drift
  cancel-in-progress: false

jobs:
  drift-detection:
    name: Detect API Drift
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Needed for accurate diffing
        
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        # Pinned to specific patch version for reproducibility
        go-version: '1.23.6'
        cache: true
        
    - name: Install code generation tools
      run: |
        # Pin tool versions for consistent formatting
        go install golang.org/x/tools/cmd/goimports@v0.24.0
        
    - name: Verify security - HTTPS only
      run: |
        # Ensure all discovery URLs use HTTPS
        if grep -E 'http://' apis.yaml; then
          echo "Error: HTTP URLs found in apis.yaml (must be HTTPS)"
          exit 1
        fi
        echo "✓ All API URLs use HTTPS"
        
    - name: Build discovery-checker
      run: |
        go build -o discovery-checker ./cmd/discovery-checker
        echo "✓ Built discovery-checker"
        
    - name: Check for drift
      id: check
      run: |
        ./discovery-checker -config apis.yaml -check -service "${{ github.event.inputs.service }}" > drift_report.txt 2>&1
        exit_code=$?
        
        # Show the output
        cat drift_report.txt
        
        # Exit code 2 = drift detected (expected)
        # Exit code 0 = no drift (expected)
        # Other = tool failure (unexpected, fail the job)
        if [ $exit_code -eq 2 ]; then
          echo "drift_detected=true" >> $GITHUB_OUTPUT
          echo "check_passed=true" >> $GITHUB_OUTPUT
          echo "✓ Drift detected (exit code 2)"
        elif [ $exit_code -eq 0 ]; then
          echo "drift_detected=false" >> $GITHUB_OUTPUT
          echo "check_passed=true" >> $GITHUB_OUTPUT
          echo "✓ No drift detected"
        else
          echo "check_passed=false" >> $GITHUB_OUTPUT
          echo "✗ Discovery checker failed with exit code $exit_code"
          exit 1
        fi
        
    - name: Generate code (if drift detected and not dry run)
      if: steps.check.outputs.check_passed == 'true' && steps.check.outputs.drift_detected == 'true' && !github.event.inputs.dry_run
      run: |
        ./discovery-checker -config apis.yaml -generate -service "${{ github.event.inputs.service }}" -output .
        echo "✓ Generated code"
        goimports -w internal/google/generated/ || true
        
    - name: Run tests
      if: steps.check.outputs.drift_detected == 'true' && !github.event.inputs.dry_run
      run: |
        go test ./internal/google/generated/... -v || true
        
    - name: Upload drift report
      if: steps.check.outputs.drift_detected == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: drift-report
        path: drift_report.txt
        retention-days: 30
        
    - name: Create Pull Request
      if: steps.check.outputs.drift_detected == 'true' && !github.event.inputs.dry_run
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'chore(api): Update Google API specifications'
        title: 'chore(api): Weekly API drift detection update'
        body: |
          ## API Drift Detected
          
          This PR contains automated updates to Google API specifications based on discovery documents.
          
          ### Changes Summary
          Please review the drift report artifact for detailed change classification.
          
          ### Risk Classification
          - **Additive**: New fields, methods, or optional parameters
          - **Risky**: New required parameters, type changes, path changes
          - **Breaking**: Removed methods, removed fields, required field additions
          
          ### Required Actions
          - [ ] Review generated type changes
          - [ ] Verify endpoint descriptors are correct
          - [ ] Run integration tests
          - [ ] Check for breaking changes requiring major version bump
          
          ---
          *Generated by API Drift Detection workflow*
        branch: auto/api-drift
        delete-branch: false  # Keep branch for updates to existing PR
        labels: |
          automated
          api-drift
          needs-review

  drift-summary:
    name: Drift Summary
    runs-on: ubuntu-latest
    if: always()
    needs: drift-detection
    
    steps:
    - name: Download drift report
      if: needs.drift-detection.result == 'success'
      uses: actions/download-artifact@v4
      with:
        name: drift-report
        path: ./
        
    - name: Create issue for drift
      if: needs.drift-detection.result == 'success' && github.event_name == 'schedule'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          
          // Only create issue if report contains breaking changes
          const report = fs.readFileSync('drift_report.txt', 'utf8');
          if (!report.includes('breaking')) {
            console.log('No breaking changes detected, skipping issue creation');
            return;
          }
          
          const title = '[URGENT] Breaking API changes detected';
          const body = `## Breaking API Changes Detected
          
          The weekly drift detection job found breaking changes in Google APIs.
          
          \`\`\`
          ${report.substring(0, 2000)}
          \`\`\`
          
          Please review the PR created by the drift detection workflow and address breaking changes.
          
          Run: \`${{ github.run_id }}\`
          `;
          
          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.name,
            title: title,
            body: body,
            labels: ['breaking-change', 'urgent', 'api-drift']
          });
