# Google API Drift Detection Allowlist
# Phase 1: Drive, Gmail, Calendar
#
# This file controls which APIs are monitored for drift and code generation.
# Each entry specifies the service name, version, and ownership for review routing.

apis:
  - service: drive
    version: v3
    discovery_url: https://www.googleapis.com/discovery/v1/apis/drive/v3/rest
    owner: "@drive-team"
    priority: 1
    description: "Google Drive API - File storage and management"
    
  - service: gmail
    version: v1
    discovery_url: https://www.googleapis.com/discovery/v1/apis/gmail/v1/rest
    owner: "@gmail-team"
    priority: 1
    description: "Gmail API - Email operations"
    
  - service: calendar
    version: v3
    discovery_url: https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest
    owner: "@calendar-team"
    priority: 1
    description: "Google Calendar API - Calendar and event management"
    
  - service: people
    version: v1
    discovery_url: https://www.googleapis.com/discovery/v1/apis/people/v1/rest
    owner: "@people-team"
    priority: 2
    description: "People API - Contact and profile management"
    
  - service: slides
    version: v1
    discovery_url: https://www.googleapis.com/discovery/v1/apis/slides/v1/rest
    owner: "@workspace-team"
    priority: 2
    description: "Google Slides API - Presentation management"
    
  - service: docs
    version: v1
    discovery_url: https://www.googleapis.com/discovery/v1/apis/docs/v1/rest
    owner: "@workspace-team"
    priority: 2
    description: "Google Docs API - Document management"
    
  - service: sheets
    version: v4
    discovery_url: https://www.googleapis.com/discovery/v1/apis/sheets/v4/rest
    owner: "@workspace-team"
    priority: 2
    description: "Google Sheets API - Spreadsheet management"
    
  - service: chat
    version: v1
    discovery_url: https://www.googleapis.com/discovery/v1/apis/chat/v1/rest
    owner: "@chat-team"
    priority: 2
    description: "Google Chat API - Chat and messaging"
    
  - service: admin
    version: directory_v1
    discovery_url: https://www.googleapis.com/discovery/v1/apis/admin/directory_v1/rest
    owner: "@admin-team"
    priority: 2
    description: "Admin SDK - Directory API - User and group management"
    
  - service: cloudidentity
    version: v1
    discovery_url: https://www.googleapis.com/discovery/v1/apis/cloudidentity/v1/rest
    owner: "@identity-team"
    priority: 2
    description: "Cloud Identity API - Group management"
    
  - service: drivelabels
    version: v2
    discovery_url: https://drivelabels.googleapis.com/$discovery/rest?version=v2
    owner: "@drive-team"
    priority: 2
    description: "Drive Labels API - Label management for Drive items"
    
  - service: script
    version: v1
    discovery_url: https://www.googleapis.com/discovery/v1/apis/script/v1/rest
    owner: "@apps-script-team"
    priority: 3
    description: "Apps Script API - Script project management"
    
  - service: tasks
    version: v1
    discovery_url: https://www.googleapis.com/discovery/v1/apis/tasks/v1/rest
    owner: "@tasks-team"
    priority: 3
    description: "Tasks API - Task list management"
    
  - service: forms
    version: v1
    discovery_url: https://forms.googleapis.com/$discovery/rest?version=v1
    owner: "@forms-team"
    priority: 3
    description: "Google Forms API - Form management"

# Risk classification thresholds for drift detection
# These rules determine how changes are classified and routed
risk_rules:
  # Additive changes - auto-PR allowed
  additive:
    - new_optional_fields
    - new_methods
    - new_optional_parameters
    - new_scopes
    
  # Risky changes - requires owner approval
  risky:
    - new_required_parameters
    - changed_path_templates
    - removed_scopes
    - type_changes_in_request
    - type_changes_in_response
    
  # Breaking changes - blocks pipeline
  breaking:
    - removed_methods
    - removed_required_fields
    - new_required_fields_in_request
    - changed_auth_requirements
    - incompatible_type_changes

# Generation settings
generation:
  # Output directories (relative to repo root)
  snapshot_dir: "third_party/google/discovery"
  generated_types_dir: "internal/google/generated"
  generated_descriptors_dir: "internal/google/generated/descriptors"
  
  # What to generate
  generate_types: true
  generate_descriptors: true
  generate_methods: false  # Phase 2: generate full method stubs
  generate_cli: false      # Phase 2: generate CLI commands
  
  # Template settings
  template_dir: "cmd/discovery-checker/templates"
  go_package_prefix: "github.com/dl-alexandre/gdrv/internal/google/generated"

# CI behavior
ci:
  # Schedule: weekly on Sundays at 2 AM UTC
  schedule: "0 2 * * 0"
  
  # PR settings
  auto_merge_additive: true
  require_owner_approval_risky: true
  block_on_breaking: true
  
  # Notification settings
  create_issues_for_breaking: true
  slack_channel: "#api-drift-alerts"
  
  # Test requirements
  run_tests_after_generation: true
  require_gofmt: true
  require_goimports: true
